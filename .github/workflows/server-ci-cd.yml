name: finora-server

on:
  push:
    branches: [ main, dev, feat/devops ]
    paths:
      - "packages/server/**"
      - ".github/workflows/server-ci-cd.yml"
  pull_request:
    branches: [ main, dev, feat/devops ]
    paths:
      - "packages/server/**"
      - ".github/workflows/server-ci-cd.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_BACK }}
          password: ${{ secrets.DOCKERHUB_TOKEN_BACK }}

      - name: Define Docker image tags
        if: github.event_name == 'push'
        shell: bash
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME_BACK }}/finora-server"
          SAFE_BRANCH="${GITHUB_REF_NAME//\//-}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> $GITHUB_ENV
          echo "TAG1=$IMAGE:$SAFE_BRANCH" >> $GITHUB_ENV
          echo "TAG2=$IMAGE:$SAFE_BRANCH-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build (PR) / Build+Push (push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/server/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.TAG1 }}
            ${{ env.TAG2 }}

  deploy:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Compute SAFE_BRANCH
        shell: bash
        run: echo "SAFE_BRANCH=${GITHUB_REF_NAME//\//-}" >> $GITHUB_ENV

      - name: Deploy to VM via SSH (password)
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME_BACK }}/finora-server
          TAG: ${{ env.SAFE_BRANCH }}
          CONTAINER: finora-server
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME_BACK }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN_BACK }}
          SERVER_ENV_FILE: ${{ secrets.SERVER_ENV_FILE }}
        with:
          host: ${{ secrets.VM_HOST }}
          port: ${{ secrets.VM_SSH_PORT }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          envs: IMAGE,TAG,CONTAINER,DOCKER_USER,DOCKER_TOKEN,SERVER_ENV_FILE
          script: |
            set -e

            echo "Logging into DockerHub..."
            echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USER" --password-stdin

            echo "Pulling image: $IMAGE:$TAG"
            docker pull "$IMAGE:$TAG"

            echo "Stopping old container (if exists)..."
            docker rm -f "$CONTAINER" || true

            echo "$SERVER_ENV_FILE" > /tmp/server.env

            echo "Starting new container..."
            docker run -d --restart unless-stopped \
              --name "$CONTAINER" \
              --env-file /tmp/server.env \
              -p 3000:3000 \
              -e NODE_ENV=production \
              "$IMAGE:$TAG"

            rm -f /tmp/server.env

            echo "Done. Running containers:"
            docker ps | grep "$CONTAINER" || true