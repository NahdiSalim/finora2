server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing (React Router / Vite)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache long pour assets statiques
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # Pas de cache pour index.html (important)
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  gzip on;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    text/xml
    application/xml
    application/xml+rss
    text/javascript;
}