<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réinitialisation de mot de passe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
      line-height: 1.6;
    }
    .email-wrapper {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .header {
      background-color: #0D4DA1;
      padding: 40px 20px;
      text-align: center;
    }
    .logo-container {
      margin-bottom: 20px;
    }
    .header h1 {
      color: #ffffff;
      font-size: 24px;
      font-weight: 400;
      margin: 0;
    }
    .content {
      padding: 40px 30px;
    }
    .greeting {
      font-size: 18px;
      color: #333333;
      margin-bottom: 20px;
      font-weight: 500;
    }
    .message {
      font-size: 15px;
      color: #555555;
      margin-bottom: 15px;
      line-height: 1.6;
    }
    .cta-container {
      text-align: center;
      margin: 35px 0;
    }
    .cta-btn {
      display: inline-block;
      padding: 14px 40px;
      background-color: #e964a2;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      transition: background-color 0.3s ease;
    }
    .cta-btn:hover {
      background-color: #e964a2;
    }
    .alternative-link {
      margin-top: 25px;
      padding: 20px;
      background-color: #f8f9fa;
      border-left: 4px solid #0D4DA1;
      border-radius: 4px;
    }
    .alternative-link p {
      font-size: 13px;
      color: #666666;
      margin-bottom: 8px;
    }
    .link-text {
      word-break: break-all;
      color: #0D4DA1;
      font-size: 13px;
    }
   
    .footer {
      padding: 30px;
      background-color: #f8f9fa;
      border-top: 1px solid #e9ecef;
    }
    .footer-text {
      font-size: 12px;
      color: #6c757d;
      text-align: center;
      margin-bottom: 10px;
    }
    .footer-logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .divider {
      height: 1px;
      background-color: #e9ecef;
      margin: 25px 0;
    }
  
  </style>
</head>
<body>
  <div class="email-wrapper">
    <!-- Header avec logo et titre -->
    <div class="header">
      <div class="logo-container">
        <svg
          width="80"
          height="75"
          viewBox="0 0 145 170"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M66.3259 149.826L1.28017 121.41C0.507652 121.076 0 120.298 0 119.431V20.1977C0 18.6413 1.5671 17.6185 2.9797 18.2188L68.0254 46.6347C68.7979 46.9682 69.3056 47.7464 69.3056 48.6136V147.847C69.3056 149.403 67.7385 150.426 66.3259 149.826Z"
            fill="#FFFFFF"
          />
          <path
            d="M69.3056 43.1218L17.1056 8.07997C16.3993 7.61304 15.4503 8.12444 15.4503 8.96936V18.8638C15.4503 19.2862 15.693 19.6865 16.0903 19.8421L69.3056 43.0995V43.1218Z"
            fill="#FFFFFF"
          />
          <path
            d="M69.3056 36.9183L31.2317 0.297896C30.5475 -0.346909 29.4218 0.120019 29.4218 1.07611V9.96997C29.4218 10.3257 29.5984 10.6815 29.9074 10.8593L69.3056 36.9183Z"
            fill="#FFFFFF"
          />
          <path
            d="M78.3551 149.826L143.401 121.41C144.173 121.076 144.681 120.298 144.681 119.431V20.1977C144.681 18.6413 143.114 17.6185 141.701 18.2188L76.6555 46.6347C75.883 46.9682 75.3754 47.7464 75.3754 48.6136V147.847C75.3754 149.403 76.9425 150.426 78.3551 149.826Z"
            fill="#FFFFFF"
          />
          <path
            d="M75.3532 43.1218L127.553 8.07997C128.259 7.61304 129.209 8.12444 129.209 8.96936V18.8638C129.209 19.2862 128.966 19.6865 128.568 19.8421L75.3532 43.0995V43.1218Z"
            fill="#FFFFFF"
          />
          <path
            d="M75.3532 36.9183L113.427 0.297896C114.111 -0.346909 115.237 0.120019 115.237 1.07611V9.96997C115.237 10.3257 115.06 10.6815 114.751 10.8593L75.3532 36.9183Z"
            fill="#FFFFFF"
          />
        </svg>
      </div>
      <h1>Réinitialisation de mot de passe</h1>
    </div>

    <!-- Contenu principal -->
    <div class="content">
      <p class="greeting">Bonjour,</p>
      
      <p class="message">
        Nous avons reçu une demande de réinitialisation de mot de passe pour votre compte THAMMplus.
      </p>

      <p class="message">
        Pour créer un nouveau mot de passe, cliquez simplement sur le bouton ci-dessous :
      </p>

      <!-- Bouton principal -->
      <div class="cta-container">
        <a href="{{resetLink}}" class="cta-btn">
          Réinitialiser mon mot de passe
        </a>
      </div>


      <div class="divider"></div>

    
    </div>

    <!-- Footer -->
    <div class="footer">          
      <p class="footer-text" style="margin-top: 20px;">
        © 2024 GIZ. Tous droits réservés.
      </p>
    </div>
  </div>
</body>
</html>
